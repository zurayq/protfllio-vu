{% macro project_card(project, compact=false) -%}
<article class="project-card{% if compact %} project-card--compact{% endif %}" data-filters="{{ project.filters|join(' ') }}">
  <img src="{{ project.cover }}" width="560" height="340" loading="lazy" decoding="async" alt="Original illustrated cover for {{ project.title }}">
  <div class="project-copy">
    <div class="project-title-line">
      <h3>{{ project.title }}</h3>
      {% if project.featured %}<span class="featured-star" aria-label="Featured project">★</span>{% endif %}
    </div>
    <p>{{ project.summary }}</p>
    <div class="tiny-links">
      <a href="{{ project.route }}">detail</a>
    </div>
  </div>
</article>
{%- endmacro %}
