  <script type="application/json" id="lore-data">[{"answer": ["hey, i\u2019m Abdulwahid. i\u2019m from Tripoli, Libya, and i currently live in \u0130zmit while studying Computer Engineering at Kocaeli University. i build software, teach English, and recently stopped treating \u201ci want to make games\u201d as a future idea.", "my work is a mix of backend tools, desktop projects, visualization, robotics, and interactive experiments. the long-term direction is game development, especially gameplay systems, tools, and the technical parts that make an experience feel good."], "filename": "about_me.txt", "folder": "life/", "slug": "so-tell-me-about-yourself", "title": "so tell me about yourself"}, {"answer": ["i liked the idea of understanding more than one layer of a system. computer engineering gave me programming, algorithms, electronics, data structures, and the occasional reminder that hardware can ruin your day too.", "i still do not think the interesting part is memorizing a language. the interesting part is being able to take an idea, model it, build it, debug it, and eventually put it in front of another person."], "filename": "why_computer_engineering.md", "folder": "engineering/", "slug": "why-computer-engineering", "title": "why computer engineering?"}, {"answer": ["games combine almost everything i find interesting: systems, interaction, visuals, sound, psychology, storytelling, performance, and people doing something completely unexpected during testing.", "i also like that the quality of the code eventually becomes something a player can feel. a delay, a bad state transition, a confusing menu, or a satisfying interaction all become part of the experience."], "filename": "why_game_development.md", "folder": "games/", "slug": "why-game-development", "title": "why game development?"}, {"answer": ["i moved from Libya to T\u00fcrkiye for university. before the engineering part could properly start, Turkish became its own project. i completed C1 Turkish and then continued into Computer Engineering at Kocaeli University.", "living in another country also made language, culture, and communication a much bigger part of how i think about products. that is one reason multilingual design matters to me."], "filename": "moving_to_turkiye.log", "folder": "life/", "slug": "how-did-you-end-up-in-turkiye", "title": "how did you end up in T\u00fcrkiye?"}, {"answer": ["teaching started as work i could do well, but it also became useful engineering training in disguise. you learn very quickly whether an explanation actually makes sense when another person has to use it.", "teaching improved my communication, planning, public speaking, feedback, and ability to change the explanation instead of blaming the person who did not understand it."], "filename": "teaching_arc.txt", "folder": "teaching/", "slug": "why-are-you-also-an-english-teacher", "title": "why are you also an English teacher?"}, {"answer": ["i worked with the Lybotics Asteroids Robotics Team in Tripoli as a team leader and mentor. i helped with planning, task distribution, technical problem solving, competition preparation, and mentoring students through robotics work.", "later, with the TAISAT Teknofest Team in Kocaeli, i contributed to power-regulation circuits and PCB layout for an autonomous vehicle project. those experiences made software feel less isolated from the physical system around it."], "filename": "robotics_lore.md", "folder": "robotics/", "slug": "what-is-the-robotics-lore", "title": "what is the robotics lore?"}, {"answer": ["it started as a normal internship search and slowly became a data-management problem. i had companies, criteria, duplicate contacts, skipped results, websites, LinkedIn checks, and email drafts spread across too many places.", "instead of continuing the same manual loop, i started building CV Bro. the project became a way to turn a frustrating process into a product problem i could actually solve."], "filename": "internship_search.log", "folder": "engineering/", "slug": "what-was-the-internship-search-arc", "title": "what was the internship-search arc?"}, {"answer": ["the main project is Imposter, a multilingual phone-passing social-deduction game. i\u2019m also rebuilding this portfolio so it feels less like a digital r\u00e9sum\u00e9 and more like an actual record of what i build and learn."], "filename": "currently_building.txt", "folder": "games/", "slug": "what-are-you-building-right-now", "title": "what are you building right now?"}, {"answer": ["become the kind of game developer who can understand the system behind the experience, communicate well with a team, and ship work that real players can feel.", "i do not want to throw away the backend, product, and software-engineering side. i want those skills to make me more useful in game development."], "filename": "long_term_goal.save", "folder": "life/", "slug": "what-is-the-long-term-goal", "title": "what is the long-term goal?"}]</script>
